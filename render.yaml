services:
  - type: web
    name: jarvis-web
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm start
    envVars:
      - key: DATABASE_URL
        value: "file:./prod.db"
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        fromService:
          name: jarvis-web
          type: web
          property: url
      - key: LLM_PROVIDER
        value: "groq"
      - key: GROQ_API_KEY
        sync: false
